spring.application.name=recetas-pi
# Base de datos
spring.datasource.url=jdbc:mysql://localhost:3306/recetas_db
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Puerto
server.port=8080

# JWT configuration
jwt.secret=change-this-secret-to-a-strong-random-value
jwt.expiration-ms=3600000

# SMTP (configura con tu proveedor real)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=tu_correo@gmail.com
spring.mail.password=tu_app_password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Password recovery
app.password-recovery.from-mail=tu_correo@gmail.com
app.password-recovery.token-expiration-minutes=30
app.password-recovery.deep-link-base=recetapp://reset-password